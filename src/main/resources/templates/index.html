<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ønskeliste</title>
    <link rel="stylesheet" href="../static/style.css" th:href="@{/style.css}">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="/images/gift.png" alt="logo">
            <span>ØNSKELISTE</span>
        </div>

            <div class="header-icons">

                <button class="icon-btn">
                    <img src="/images/bell-ring.png" alt="Notification">
                </button>

                <button class="icon-btn">
                    <img src="/images/user-round.png" alt="profile">
                </button>

                <button class="login-btn">Login</button>
            </div>
    </header>
<main>
    <div class="create">
        <button class="create-btn">+ Create new wishlist</button>
    </div>

    <div class="wishlists">

        <div class="wishlists-btn">
            <h3>My wishlists</h3>
            <hr>
            <div class="wishlist-grid">
                <button class="lists-btn">Birthday</button>
                <button class="lists-btn">Christmas</button>
                <button class="lists-btn full-width">Wishes</button>
            </div>
        </div>

        <div class="vertical-line"></div>

            <div class="shared-btn">
                <h3>Shared wishlists</h3>
                <hr>
                <div class="wishlist-grid">
                    <div class="lists-btn full-width">50th Birthday</div>
                    <div class="lists-btn full-width">B-day!</div>
                </div>
            </div>
        </div>
</main>




    <footer>
        <h2>Contact info</h2>
        <div class="footer-info">
            <div class="footer-contact">
                <span>email@example.com</span>
                <span>+45 12 34 56 78</span>
            </div>
            <div class="footer-SoMe-group">
                <button class="footer-SoMe">Facebook</button>
                <button class="footer-SoMe">Instagram</button>
            </div>
        </div>
        <hr>
        <div class="footer-collaborators">
            <div class="collaborators-boxes">
                <h4>Collaborators:</h4>
                <div class="partner-box">NIKE</div>
                <div class="partner-box">Apple</div>
                <div class="partner-box">Zalando</div>
                <div class="partner-box">Zalando</div>
                <div class="partner-box">SAMSUNG</div>
            </div>
        </div>
    </footer>
</body>
</html>
