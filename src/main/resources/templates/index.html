<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ønskeliste</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="container">
    <header class="header">
        <div class="logo">🎁 ØNSKELISTE</div>
        <div class="header-icons">
            <button>🔔</button>
            <button>👤</button>
            <button class="login-btn">Login</button>
        </div>
    </header>

    <section class="create-list">
        <button class="create-btn">+ Opret ny ønskeliste</button>
    </section>

    <section class="lists-section">
        <div class="list-column">
            <h2>Mine ønskelister</h2>
            <div class="card">Fødselsdag – 12 ønsker</div>
            <div class="card">Jul – 8 ønsker</div>
            <div class="card">Ønsker 2022 – 15 ønsker</div>
        </div>

        <div class="list-column">
            <h2>Delt med mig</h2>
            <div class="card">Mors ønskeliste – 7 ønsker</div>
            <div class="card">Vens ønskeliste – 10 ønsker</div>
        </div>
    </section>

    <footer class="footer">
        <h3>Kontakt os:</h3>
        <p>✉ info@site.dk | 📞 1234 5678</p>
    </footer>
</div>
<body>
</html>
