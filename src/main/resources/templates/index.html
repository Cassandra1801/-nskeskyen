<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ønskeliste</title>
    <link rel="stylesheet" href="../static/style.css" th:href="@{/style.css}">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img th:src="@{/images/Gave.png}" alt="logo">
            <span>ØNSKELISTE</span>
        </div>

            <div class="header-icons">

                <button class="icon-btn">
                    <img th:src="@{/images/Klokke.png}" alt="Notification">
                </button>

                <button class="icon-btn">
                    <img th:src="@{/images/Person.png}" alt="profile">
                </button>

                <button class="login-btn">Login</button>

            </div>

    </header>




    <footer>
        <h2>Contact info</h2>
        <div class="footer-info">
            <div class="footer-contact">
                <span>email@example.com</span>
                <span>+45 12 34 56 78</span>
            </div>
            <div class="footer-SoMe-group">
                <div class="footer-SoMe">Facebook</div>
                <div class="footer-SoMe">Instagram</div>
            </div>
        </div>
        <hr>
        <div class="footer-collaborators">
            <div class="collaborators-boxes">
                <h4>Collaborators:</h4>
                <div class="partner-box">NIKE</div>
                <div class="partner-box">Apple</div>
                <div class="partner-box">Zalando</div>
                <div class="partner-box">Zalando</div>
                <div class="partner-box">SAMSUNG</div>
            </div>
        </div>
    </footer>
</body>
</html>
