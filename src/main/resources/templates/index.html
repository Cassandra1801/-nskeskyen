<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ønskeliste</title>
    <link rel="stylesheet" href="../static/style.css" th:href="@{/style.css}">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="/images/gift.png" alt="logo">
            <span>WISHLIST</span>
        </div>

        <div class="header-icons">
            <button type="button" class="icon-btn">
                <img src="/images/bell-ring.png" alt="Notification">
            </button>

            <button type="button" class="icon-btn">
                <img src="/images/user-round.png" alt="Profile">
            </button>

            <button type="button" class="login-btn">Login</button>
        </div>
    </header>

    <main class="page-main">
        <div class="create">
            <a th:href="@{/create}" class="create-btn">+ Create new wishlist</a>
        </div>

        <div class="wishlist-overview">
            <section class="wishlist-column">
                <div class="panel-header panel-header-centered">
                    <img src="/images/users.png" alt="wishlists">
                    <h3>My wishlists</h3>
                </div>
                <hr>
                <div class="wishlist-grid">
                    <a th:href="@{/api/wishlists/{id}(id=1)}" class="wishlist-card">Birthday</a>
                    <a th:href="@{/api/wishlists/{id}(id=1)}" class="wishlist-card">Christmas</a>
                    <a th:href="@{/api/wishlists/{id}(id=1)}" class="wishlist-card full-width">Wishes</a>
                </div>
            </section>

            <div class="vertical-line"></div>

            <section class="wishlist-column">
                <div class="panel-header panel-header-centered">
                    <img src="/images/bookmark.png" alt="shared">
                    <h3>Shared wishlists</h3>
                </div>
                <hr>
                <div class="wishlist-grid">
                    <a th:href="@{/wishlist}" class="wishlist-card full-width">50th Birthday</a>
                    <a th:href="@{/wishlist}" class="wishlist-card full-width">B-day!</a>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <h2>Contact info</h2>
        <div class="footer-info">
            <div class="footer-contact">
                <span>email@example.com</span>
                <span>+45 12 34 56 78</span>
            </div>
            <div class="footer-social-group">
                <button type="button" class="footer-social-btn">Facebook</button>
                <button type="button" class="footer-social-btn">Instagram</button>
            </div>
        </div>
        <hr>
        <div class="footer-collaborators">
            <div class="collaborators-boxes">
                <h4>Collaborators:</h4>
                <div class="partner-box">NIKE</div>
                <div class="partner-box">Apple</div>
                <div class="partner-box">Zalando</div>
                <div class="partner-box">Zalando</div>
                <div class="partner-box">SAMSUNG</div>
            </div>
        </div>
    </footer>
</body>
</html>
